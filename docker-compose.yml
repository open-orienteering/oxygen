services:
  mysql:
    image: mysql:8.0
    container_name: oxygen-mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
      network: host
    container_name: oxygen-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://meos@mysql:3306/itest"
      MEOS_MAIN_DB_URL: "mysql://meos@mysql:3306/MeOSMain"
      PORT: "3001"
      HOST: "0.0.0.0"
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      target: web
      network: host
    container_name: oxygen-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  mysql-data:
